<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metrobús RT</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0f14;--panel:#141720;--border:#1e2433;--accent:#f5a623;--text:#e8eaf0;--muted:#636b80;--green:#3fcf60;--red:#f55a5a;--yellow:#f5c842}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#topbar h1{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent)}
#dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0}
#dot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
#dot.err{background:var(--red)}
#dot.busy{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#status{font-size:11px;color:var(--muted);flex:1}
#refresh-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 9px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
#refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
#filters{background:var(--panel);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:5px;align-items:center;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#filters::-webkit-scrollbar{display:none}
.fl{font-size:10px;color:var(--muted);letter-spacing:.1em;flex-shrink:0}
.lb{border:none;border-radius:4px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;opacity:.3;transition:opacity .15s;flex-shrink:0}
.lb.on{opacity:1}
.ba{background:var(--border);color:var(--text);border:1px solid var(--muted);border-radius:4px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0}
.ba.on{background:var(--accent);color:#000;border-color:var(--accent)}
#map{flex:1;min-height:0}
#stats{background:var(--panel);border-top:1px solid var(--border);padding:9px 14px;display:flex;gap:14px;align-items:center;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#stats::-webkit-scrollbar{display:none}
.sv{font-size:17px;font-weight:700;line-height:1}
.sl{font-size:9px;color:var(--muted);letter-spacing:.1em}
.ss{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
.sd{width:1px;height:28px;background:var(--border)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
#lbox{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:340px;width:100%}
#lbox h2{font-size:15px;color:var(--accent);margin-bottom:6px}
#lbox p{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.field{margin-bottom:12px}
.field label{font-size:10px;color:var(--muted);letter-spacing:.08em;display:block;margin-bottom:4px}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:6px;font-family:inherit;font-size:13px}
.field input:focus{outline:none;border-color:var(--accent)}
#lbtn{width:100%;background:var(--accent);color:#000;border:none;padding:11px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
#lbtn:disabled{opacity:.5;cursor:default}
#lerr{font-size:11px;color:var(--red);margin-top:8px;display:none;text-align:center}
#demo-lnk{display:block;text-align:center;margin-top:12px;font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline}
#loading{position:fixed;inset:0;background:rgba(13,15,20,.82);display:none;align-items:center;justify-content:center;z-index:8000;flex-direction:column;gap:10px}
#loading.show{display:flex}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:11px;color:var(--muted)}
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:20px;font-size:11px;z-index:7000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--border)!important;border-radius:8px!important;color:var(--text)!important}
.leaflet-popup-tip{background:var(--panel)!important}
.leaflet-popup-content{margin:11px 13px!important;font-family:'Courier New',monospace}
.pt{font-size:12px;font-weight:700;margin-bottom:5px}
.pr{font-size:11px;color:var(--muted);margin-bottom:3px}
.pr span{color:var(--text)}
.ok{color:var(--green)}.warn{color:var(--yellow)}.bad{color:var(--red)}
</style>
</head>

</div>
<div id="map"></div>
<div id="stats">
  <div class="ss"><div class="sv" id="s0" style="color:var(--accent)">—</div><div class="sl">UNIDADES</div></div>
  <div class="sd"></div>
  <div class="ss"><div class="sv ok" id="s1">—</div><div class="sl">EN TIEMPO</div></div>

  <div class="sd"></div>
  <div class="ss"><div class="sv" id="s4" style="color:var(--muted);font-size:10px">—</div><div class="sl">ACTUALIZ.</div></div>
</div>

const LC={'1':'#42A76B','2':'#42A76B','3':'#7A9A01','4':'#FF9A03','5':'#141982','6':'#E44599','7':'#116633'};

const map=L.map('map',{center:[19.4326,-99.1332],zoom:12,zoomControl:false,preferCanvas:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'©CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);
const stopLyr=L.layerGroup().addTo(map);
const busLyr=L.layerGroup().addTo(map);
let markers={},activeL=new Set(['1','2','3','4','5','6','7']),buses=[],isDemoMode=false;
let rtUrl=null,rtExpiry=null,timer=null,credentials=null;

// GTFS-RT proto definition (inline)
const GTFS_PROTO = `
syntax = "proto2";
message FeedMessage {
  required FeedHeader header = 1;
  repeated FeedEntity entity = 2;
}
message FeedHeader {
  required string gtfs_realtime_version = 1;
  optional uint32 incrementality = 2;
  optional uint64 timestamp = 3;
}
message FeedEntity {
  required string id = 1;
  optional bool is_deleted = 2;
  optional TripUpdate trip_update = 3;
  optional VehiclePosition vehicle = 4;
  optional Alert alert = 5;
}
message VehiclePosition {
  optional TripDescriptor trip = 1;
  optional VehicleDescriptor vehicle = 2;
  optional Position position = 3;
  optional uint32 current_stop_sequence = 4;
  optional string stop_id = 5;
  optional int32 current_status = 6;
  optional uint64 timestamp = 7;
}
message TripDescriptor {
  optional string trip_id = 1;
  optional string route_id = 2;
  optional uint32 direction_id = 3;
  optional string start_time = 4;
  optional string start_date = 5;
  optional int32 schedule_relationship = 6;
}
message VehicleDescriptor {
  optional string id = 1;
  optional string label = 2;
  optional string license_plate = 3;
}
message Position {
  required float latitude = 1;
  required float longitude = 2;
  optional float bearing = 3;
  optional double odometer = 4;
  optional float speed = 5;
}
message TripUpdate {
  required TripDescriptor trip = 1;
}
message Alert {
  optional string header_text = 1;
}
`;

let FeedMessage = null;

async function loadProto() {
  const root = protobuf.parse(GTFS_PROTO, {keepCase: true}).root;
  FeedMessage = root.lookupType('FeedMessage');
}

function drawStops(){
  stopLyr.clearLayers();
  if(map.getZoom()<14)return;
  STOPS_DATA.forEach(s=>{
    if(!s.lines.some(l=>activeL.has(l)))return;
    const c=LC[s.lines[0]]||'#888';
    L.circleMarker([s.lat,s.lon],{radius:4,color:c,fillColor:c,fillOpacity:.9,weight:1.5})
     .bindPopup('<div class="pt">'+s.name+'</div><div class="pr">L'+s.lines.join(' L')+'</div>',{maxWidth:180})
     .addTo(stopLyr);
  });
}
map.on('zoomend',drawStops);

function bIcon(line,delay){
  const c=LC[line]||'#888',tc=line==='4'?'#000':'#fff';
  const sc=delay>300?'#f55a5a':delay>60?'#f5c842':'#3fcf60';
  return L.divIcon({className:'',iconSize:[26,26],iconAnchor:[13,13],
    html:'<div style="width:26px;height:26px;border-radius:50%;background:'+c+';border:2.5px solid '+sc+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+tc+';box-shadow:0 2px 8px rgba(0,0,0,.5)">'+(line||'?')+'</div>'});
}
function dlabel(sec){
  if(sec==null)return{t:'Sin datos',cls:''};
  if(sec<=60)return{t:'En tiempo',cls:'ok'};
  if(sec<=300)return{t:'+'+Math.round(sec/60)+' min',cls:'warn'};
  return{t:'+'+Math.round(sec/60)+' min TARDE',cls:'bad'};
}
function render(){
  const cur=new Set(buses.map(v=>v.id));
  Object.keys(markers).forEach(id=>{if(!cur.has(id)){busLyr.removeLayer(markers[id]);delete markers[id];}});
  let total=0,ok=0,warn=0,late=0;
  buses.forEach(v=>{
    if(!activeL.has(v.line)){if(markers[v.id]){busLyr.removeLayer(markers[v.id]);delete markers[v.id];}return;}
    if(!v.lat||!v.lon)return;
    total++;const d=v.delay||0;
    if(d<=60)ok++;else if(d<=300)warn++;else late++;
    const ic=bIcon(v.line,d),dl=dlabel(v.delay);
    const pop='<div class="pt"><span style="background:'+(LC[v.line]||'#888')+';color:'+(v.line==='4'?'#000':'#fff')+';padding:1px 6px;border-radius:3px;font-size:10px">L'+v.line+'</span> '+(v.vid||v.id)+'</div>'
      +'<div class="pr">Estado: <span class="'+dl.cls+'">'+dl.t+'</span></div>'
      +(v.speed!=null?'<div class="pr">Vel: <span>'+Math.round(v.speed)+' km/h</span></div>':'');
    if(markers[v.id]){markers[v.id].setLatLng([v.lat,v.lon]).setIcon(ic);markers[v.id].getPopup()?.setContent(pop);}
    else{markers[v.id]=L.marker([v.lat,v.lon],{icon:ic}).bindPopup(pop,{maxWidth:220}).addTo(busLyr);}
  });
  document.getElementById('s0').textContent=total||'0';
  document.getElementById('s1').textContent=ok;
  document.getElementById('s2').textContent=warn;
  document.getElementById('s3').textContent=late;
  const n=new Date();
  document.getElementById('s4').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');
}

function isExpired(){
  if(!rtExpiry)return true;
  return new Date(rtExpiry.replace(' ','T')+'-06:00') < new Date();
}
async function ensureAuth(){
  if(!isExpired()&&rtUrl)return;
  const res=await fetch(PROXY+'/partnerValidation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:credentials.user,senha:credentials.pass})});
  if(!res.ok)throw new Error('Auth HTTP '+res.status);
  const data=await res.json();
  if(!data.urlRealTime)throw new Error('Sin urlRealTime');
  rtUrl=data.urlRealTime;
  rtExpiry=data.expirationDateTime;
}

async function doRefresh(){
  if(isDemoMode){buses=genDemo();render();drawStops();setStatus('live','Demo — '+buses.length+' unidades');return;}
  if(!credentials)return;
  setDot('busy');document.getElementById('status').textContent='Actualizando...';
  try{
    await ensureAuth();
    if(!FeedMessage)await loadProto();
    const r=await fetch(PROXY+'/fetch?url='+encodeURIComponent(rtUrl));
    if(!r.ok)throw new Error('Feed HTTP '+r.status);
    const buf=new Uint8Array(await r.arrayBuffer());
    const msg=FeedMessage.decode(buf);
    const entities=msg.entity||[];
    console.log('Decoded entities:',entities.length);
    if(entities.length>0){
      const s=entities[0];
      console.log('First entity:',JSON.stringify({
        id:s.id,
        trip:s.vehicle&&s.vehicle.trip?{route_id:s.vehicle.trip.route_id,trip_id:s.vehicle.trip.trip_id}:null,
        pos:s.vehicle&&s.vehicle.position?{lat:s.vehicle.position.latitude,lon:s.vehicle.position.longitude}:null
      }));
    }
    buses=entities
      .filter(e=>e.vehicle&&e.vehicle.position&&e.vehicle.position.latitude)
      .map(e=>{
        const rid=e.vehicle.trip&&e.vehicle.trip.route_id||'';
        const line=ROUTE_TO_LINE[rid]||'?';
        return {
          id:e.id,
          vid:e.vehicle.vehicle&&(e.vehicle.vehicle.id||e.vehicle.vehicle.label)||e.id,
          line,
          lat:e.vehicle.position.latitude,
          lon:e.vehicle.position.longitude,
          speed:e.vehicle.position.speed?e.vehicle.position.speed*3.6:null,
          delay:null,
          routeId:rid
        };
      })
      .filter(v=>v.line!=='?');
    console.log('Buses with known line:',buses.length,'of',entities.filter(e=>e.vehicle&&e.vehicle.position).length);
    render();drawStops();
    setStatus('live','En vivo — '+buses.length+' unidades');
    toast('Actualizado: '+buses.length+' unidades');
  }catch(err){
    setDot('err');document.getElementById('status').textContent='Error: '+err.message;
    toast(err.message);console.error(err);
  }
}

function genDemo(){
  const out=[];let id=1000;
  ['1','2','3','4','5','6','7'].forEach(line=>{
    const ls=STOPS_DATA.filter(s=>s.lines.includes(line));
    for(let i=0;i<9&&i<ls.length;i++){
      const s=ls[Math.floor(Math.random()*ls.length)];
      const delays=[0,0,0,60,120,300,600];
      out.push({id:String(id++),vid:'MB'+line+'-'+id,line,lat:s.lat+(Math.random()-.5)*.004,lon:s.lon+(Math.random()-.5)*.004,speed:Math.random()*35,delay:delays[Math.floor(Math.random()*delays.length)]});
    }
  });
  return out;
}

function setDot(st){const d=document.getElementById('dot');d.className=st;}
function setStatus(st,txt){setDot(st);document.getElementById('status').textContent=txt;}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2500);}
function showLoading(v,txt){const l=document.getElementById('loading');l.classList.toggle('show',v);if(txt)document.getElementById('ltxt').textContent=txt;}

document.querySelectorAll('.lb').forEach(btn=>{
  btn.addEventListener('click',()=>{const l=btn.dataset.l;activeL.has(l)?activeL.delete(l):activeL.add(l);btn.classList.toggle('on',activeL.has(l));document.getElementById('btn-all').classList.toggle('on',activeL.size===7);render();drawStops();});
});
document.getElementById('btn-all').addEventListener('click',()=>{
  const all=activeL.size===7;all?activeL.clear():['1','2','3','4','5','6','7'].forEach(l=>activeL.add(l));
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',!all));
  document.getElementById('btn-all').classList.toggle('on',!all);render();drawStops();
});
document.getElementById('refresh-btn').addEventListener('click',doRefresh);

document.getElementById('lbtn').addEventListener('click',async()=>{
  const user=document.getElementById('iu').value.trim();
  const pass=document.getElementById('ip').value.trim();
  if(!user||!pass){showErr('Ingresa usuario y contraseña');return;}
  const btn=document.getElementById('lbtn');
  btn.disabled=true;btn.textContent='Conectando...';
  showLoading(true,'Autenticando...');
  credentials={user,pass};
  try{
    await ensureAuth();
    await loadProto();
    document.getElementById('overlay').style.display='none';
    showLoading(false);
    setStatus('busy','Cargando feed...');
    await doRefresh();
    if(timer)clearInterval(timer);
    timer=setInterval(doRefresh,30000);
  }catch(err){
    showLoading(false);showErr(err.message);btn.disabled=false;btn.textContent='Conectar';credentials=null;
  }
});
document.getElementById('ip').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lbtn').click();});
document.getElementById('iu').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('ip').focus();});
document.getElementById('demo-lnk').addEventListener('click',()=>{
  isDemoMode=true;document.getElementById('overlay').style.display='none';
  buses=genDemo();render();drawStops();setStatus('live','Demo — '+buses.length+' unidades');
  if(timer)clearInterval(timer);timer=setInterval(doRefresh,8000);
});
function showErr(msg){const e=document.getElementById('lerr');e.textContent=msg;e.style.display='block';}
setStatus('','Esperando login...');
loadProto().catch(console.error);
</script>
